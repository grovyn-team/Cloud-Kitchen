# Reference deployment for one client instance.
# Usage: docker compose up --build
#
# Ports are intentionally NOT published to the host (no `ports:`). Dokploy's Traefik proxy
# (or any other reverse proxy) reaches these containers over the internal Docker network by
# service name + port, using the domain you configure per app in Dokploy. Publishing fixed
# host ports would let only one stack on the whole server bind 8080/3001 at a time, which
# breaks running multiple clients on the same Oracle host and is what caused
# "port is already allocated" errors. If you need direct host access for local testing
# without Dokploy, add a docker-compose.override.yml with your own `ports:` mapping —
# don't edit this file for that.
#
# For multiple clients, run one stack per client (separate Dokploy app/project) with a
# different .env and a different domain — no source changes needed.
services:
  backend:
    build:
      context: ./backend
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      AUTH_DEMO_PASSWORD: ${AUTH_DEMO_PASSWORD:-grovyn@123}
      AUTH_DEMO_ENABLED: ${AUTH_DEMO_ENABLED:-true}
      SERVICE_NAME: ${SERVICE_NAME:-grovyn-autopilot}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    expose:
      - "8080"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
      VITE_BRAND_NAME: ${VITE_BRAND_NAME:-Grovyn Autopilot}
      VITE_BRAND_SHORT_NAME: ${VITE_BRAND_SHORT_NAME:-Autopilot}
      VITE_BRAND_LOGO_URL: ${VITE_BRAND_LOGO_URL:-}
      VITE_BRAND_FAVICON_URL: ${VITE_BRAND_FAVICON_URL:-}
      VITE_BRAND_PRIMARY_COLOR: ${VITE_BRAND_PRIMARY_COLOR:-221 83% 53%}
      VITE_BRAND_SECONDARY_COLOR: ${VITE_BRAND_SECONDARY_COLOR:-210 40% 96%}
      VITE_SUPPORT_EMAIL: ${VITE_SUPPORT_EMAIL:-}
      VITE_SUPPORT_PHONE: ${VITE_SUPPORT_PHONE:-}
      VITE_COMPANY_ADDRESS: ${VITE_COMPANY_ADDRESS:-}
      VITE_SHOW_DEMO_CREDENTIALS: ${VITE_SHOW_DEMO_CREDENTIALS:-true}
    depends_on:
      - backend
    restart: unless-stopped
