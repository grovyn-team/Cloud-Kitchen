server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Runtime branding config is regenerated on container start (docker-entrypoint.sh) —
  # never let intermediaries cache a stale version.
  location = /runtime-config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    try_files /runtime-config.js =404;
  }

  # Hashed build assets are safe to cache aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback — client-side routing (react-router) handles the rest.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
